# Order Service Configuration (Dev)

spring:
  application:
    name: order-service

  mvc:
    problemdetails:
      enabled: true

  # Database Configuration
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/order_service_db
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:15}
      minimum-idle: ${DB_MIN_IDLE:5}
      idle-timeout: 300000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Circuit Breaker Configuration
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
        alphanumeric-ids:
          enabled: true
    circuitbreaker:
      resilience4j:
        enabled: true

server:
  port: 0

# Feign Client Configuration
feign:
  client:
    config:
      user-service:
        connect-timeout: ${FEIGN_CONNECT_TIMEOUT:5000}
        read-timeout: ${FEIGN_READ_TIMEOUT:5000}
        retry-attempts: ${FEIGN_RETRY_ATTEMPTS:3}
      menu-service:
        connect-timeout: ${FEIGN_CONNECT_TIMEOUT:5000}
        read-timeout: ${FEIGN_READ_TIMEOUT:5000}
        retry-attempts: ${FEIGN_RETRY_ATTEMPTS:3}
      kitchen-service:
        connect-timeout: ${FEIGN_CONNECT_TIMEOUT:5000}
        read-timeout: ${FEIGN_READ_TIMEOUT:5000}
        retry-attempts: ${FEIGN_RETRY_ATTEMPTS:3}

# Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: ${CB_SLIDING_WINDOW_SIZE:10}
        permittedNumberOfCallsInHalfOpenState: ${CB_PERMITTED_CALLS:3}
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: ${CB_MIN_CALLS:5}
        waitDurationInOpenState: ${CB_WAIT_DURATION:10s}
        failureRateThreshold: ${CB_FAILURE_RATE:50}
        eventConsumerBufferSize: 10

  # Retry Configuration
  retry:
    configs:
      default:
        maxAttempts: ${RETRY_MAX_ATTEMPTS:3}
        waitDuration: ${RETRY_WAIT_DURATION:1s}
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2

# Order Configuration
order:
  status:
    auto-confirm-timeout: ${AUTO_CONFIRM_TIMEOUT:300}
  payment:
    timeout: ${PAYMENT_TIMEOUT:600}
  notification:
    enabled: ${NOTIFICATION_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,retries
  endpoint:
    health:
      show-details: when-authorized
  health:
    circuitbreakers:
      enabled: true

eureka:
  instance:
    instanceId: ${spring.application.name}:${vcap.application.instance_id:${spring.application.instance_id:${random.value}}}
