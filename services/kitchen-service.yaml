spring:
  application:
    name: kitchen-service
  # MongoDB Configuration for Firestore API
  data:
    mongodb:
      uri: mongodb://root:JRTgq5KibyHckge0t5SWLXMgjzdH5IJk6ozSAx7k8pYrwoXp@f2e45088-9d0e-4153-9ea7-e017549f617d.asia-southeast1.firestore.goog:443/cafeteria-firestore-mongo?loadBalanced=true&tls=true&authMechanism=SCRAM-SHA-256&retryWrites=false
      # Connection Pool settings
      auto-index-creation: true

server:
  port: 0 # Use random port for load balancing

# Kitchen-specific Configuration
kitchen:
  operations:
    max-concurrent-orders: 50
    prep-time-multiplier: 1.0
    auto-assign-orders: true
  status:
    update-interval: 30 # seconds
    auto-complete-timeout: 1800 # 30 minutes
  queue:
    max-size: 100
    processing-timeout: 3600 # 1 hour

# WebSocket Configuration
websocket:
  enabled: true
  path: /kitchen-updates
  allowed-origins: 'http://localhost:3000,http://localhost:8080'

# Notification Configuration
notification:
  enabled: true
  channels:
    email: false
    websocket: true
    sms: false

# Actuator & Health Check
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,mongodb
  endpoint:
    health:
      show-details: always
  health:
    mongo:
      enabled: true

# Eureka Registration
eureka:
  instance:
    instanceId: ${spring.application.name}:${random.value}
    prefer-ip-address: true
