spring:
  application:
    name: kitchen-service
  mongodb:
    uri: mongodb://chamath:48M-q6bhi0Q8rC-sJmCE4CzD9fP31-zoPxiHaWZLqYXoL_Ae@f3bff60a-22ac-4c95-9645-667a0a8a73b1.asia-southeast1.firestore.goog:443/cafeteria-firestore-mongo?loadBalanced=true&tls=true&authMechanism=SCRAM-SHA-256&retryWrites=false
    auto-index-creation: true

server:
  port: 0 # Load balancing සඳහා random port එකක් පාවිච්චි කරයි

# Kitchen-specific Configuration
kitchen:
  operations:
    max-concurrent-orders: 50
    prep-time-multiplier: 1.0
    auto-assign-orders: true
  status:
    update-interval: 30 # seconds
    auto-complete-timeout: 1800 # 30 minutes
  queue:
    max-size: 100
    processing-timeout: 3600 # 1 hour

# WebSocket Configuration
websocket:
  enabled: true
  path: /kitchen-updates
  allowed-origins: 'http://localhost:3000,http://localhost:8080'

# Notification Configuration
notification:
  enabled: true
  channels:
    email: false
    websocket: true
    sms: false

# Actuator & Health Check
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,mongodb
  endpoint:
    health:
      show-details: always
  health:
    mongo:
      enabled: true

# Eureka Registration
eureka:
  instance:
    instanceId: ${spring.application.name}:${random.value}
    prefer-ip-address: true
