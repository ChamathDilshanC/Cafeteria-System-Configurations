spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/auth/**, /api/users/**
          filters:
            - StripPrefix=1 # මේක දැම්මම /api කෑල්ල අයින් කරලා සර්විස් එකට යවනවා
        - id: menu-service
          uri: lb://MENU-SERVICE
          predicates:
            - Path=/api/menu/**, /api/categories/**
          filters:
            - StripPrefix=1
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1
        - id: kitchen-service
          uri: lb://KITCHEN-SERVICE
          predicates:
            - Path=/api/kitchen/**
          filters:
            - StripPrefix=1
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: '*'
            allowedMethods: '*'
            allowedHeaders: '*'
            allowCredentials: true
