spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/auth/**,/api/users/**
              filters:
                - StripPrefix=1

            - id: menu-service
              uri: lb://MENU-SERVICE
              predicates:
                - Path=/api/menu/**,/api/categories/**
              filters:
                - StripPrefix=1

            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/orders/**
              filters:
                - StripPrefix=1

            - id: kitchen-service
              uri: lb://KITCHEN-SERVICE
              predicates:
                - Path=/api/kitchen/**
              filters:
                - StripPrefix=1

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - 'http://localhost:3000'
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: '*'
            allowCredentials: true

      default-filters:
        - PreserveHostHeader

server:
  port: 8080
