spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/auth/**, /api/users/**
              filters:
                - StripPrefix=1
            - id: menu-service
              uri: lb://MENU-SERVICE
              predicates:
                - Path=/api/menu/**, /api/categories/**
              filters:
                - StripPrefix=1
            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/orders/**
              filters:
                - StripPrefix=1
            - id: kitchen-service
              uri: lb://KITCHEN-SERVICE
              predicates:
                - Path=/api/kitchen/**
              filters:
                - StripPrefix=1

server:
  port: 8080

eureka:
  client:
    service-url:
      default-zone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,routes